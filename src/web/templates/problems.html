<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Défis de Codage - AlgoCompiler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/problems.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="problems-page">
    <div class="container">
        {% set header_custom_controls %}
        {% if not current_user.is_authenticated %}
        <a href="{{ url_for('auth.signup') }}" class="btn primary highlight auth-btn" style="color: white;"><i
                class="fas fa-user-plus"></i> S'inscrire</a>
        {% endif %}
        <div class="separator"></div>
        {% endset %}
        {% include 'partials/navbar.html' %}

        <div class="problems-layout">
            <aside class="problems-sidebar">
                <div class="sidebar-header">
                    <h3><i class="fas fa-filter"></i> Filtres</h3>
                    <button id="reset-filters" class="btn-reset" title="Réinitialiser tous les filtres">
                        <i class="fas fa-undo-alt"></i> Réinitialiser
                    </button>
                </div>

                <div class="filter-section">
                    <h4><i class="fas fa-tags"></i> Thèmes</h4>
                    <div class="filter-options" id="topic-filters">
                        <label class="filter-chip">
                            <input type="checkbox" name="topic" value="Basics">
                            <span>Bases</span>
                        </label>
                        <label class="filter-chip">
                            <input type="checkbox" name="topic" value="Arrays">
                            <span>Tableaux</span>
                        </label>
                        <label class="filter-chip">
                            <input type="checkbox" name="topic" value="Strings">
                            <span>Chaînes</span>
                        </label>
                        <label class="filter-chip">
                            <input type="checkbox" name="topic" value="Algorithms">
                            <span>Algorithmes</span>
                        </label>
                        <label class="filter-chip">
                            <input type="checkbox" name="topic" value="Functions">
                            <span>Fonctions</span>
                        </label>
                        <label class="filter-chip">
                            <input type="checkbox" name="topic" value="Linked Lists">
                            <span>Listes Chaînées</span>
                        </label>
                        <label class="filter-chip">
                            <input type="checkbox" name="topic" value="Stacks">
                            <span>Piles</span>
                        </label>
                        <label class="filter-chip">
                            <input type="checkbox" name="topic" value="Queues">
                            <span>Files</span>
                        </label>
                    </div>
                </div>

                <div class="filter-section">
                    <h4><i class="fas fa-layer-group"></i> Difficulté</h4>
                    <div class="filter-options" id="difficulty-filters">
                        <label class="filter-chip difficulty-Easy">
                            <input type="checkbox" name="difficulty" value="Easy">
                            <span>Facile</span>
                        </label>
                        <label class="filter-chip difficulty-Medium">
                            <input type="checkbox" name="difficulty" value="Medium">
                            <span>Moyen</span>
                        </label>
                        <label class="filter-chip difficulty-Hard">
                            <input type="checkbox" name="difficulty" value="Hard">
                            <span>Difficile</span>
                        </label>
                    </div>
                </div>
            </aside>

            <main class="problems-main">
                <div class="problems-header">
                    <h1><i class="fas fa-laptop-code"></i> Défis de Codage</h1>
                    <p>Pratiquez l'algorithmique avec notre série d'exercices.</p>
                </div>

                <div class="problems-list" id="problems-list">
                    <!-- List populated via JS -->
                    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Chargement des défis...</div>
                </div>
            </main>
        </div>
    </div>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/level_pill.js') }}"></script>
    <script src="{{ url_for('static', filename='js/problems.js') }}"></script>
</body>

</html>
