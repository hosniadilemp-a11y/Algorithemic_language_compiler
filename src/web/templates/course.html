<!DOCTYPE html>
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoCompiler - Cours</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=5">
    <link rel="stylesheet" href="{{ url_for('static', filename='course-styles.css') }}?v=14">
    <link rel="stylesheet" href="{{ url_for('static', filename='quiz-styles.css') }}?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="course-standalone-body">
    <div class="course-page-shell">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="/" class="logo" style="text-decoration: none;">
                    <i class="fas fa-terminal"></i> AlgoCompiler
                </a>

                <nav class="nav-main">
                    <a href="/" class="btn secondary highlight" title="Retour au compilateur">
                        <i class="fas fa-code"></i> <span>Éditeur</span>
                    </a>
                    <a href="/course" class="btn secondary highlight" title="Cours d'algorithmique">
                        <i class="fas fa-graduation-cap"></i> <span>Cours</span>
                    </a>
                    <a href="/problems" class="btn secondary highlight" title="Défis de codage">
                        <i class="fas fa-laptop-code"></i> <span>Défis</span>
                    </a>
                    <a href="/leaderboard" class="btn secondary highlight" title="Classement">
                        <i class="fas fa-trophy"></i> <span>Classement</span>
                    </a>
                </nav>
            </div>

            <div class="controls">
                <button class="btn secondary" data-theme-toggle title="Basculer le thème">
                    <i class="fas fa-sun"></i> <span class="theme-label">Mode Clair</span>
                </button>
                <div class="separator"></div>
                {% if current_user.is_authenticated %}
                <a href="/progress" class="btn secondary auth-btn" title="Mon Profil"><i class="fas fa-user-circle"></i>
                    <span>{{ current_user.name }}</span></a>
                <a href="{{ url_for('auth.logout') }}" class="btn auth-btn"
                    style="color: #dc3545; border: 1px solid #dc3545; background: transparent;" title="Déconnexion"><i
                        class="fas fa-sign-out-alt"></i></a>
                {% else %}
                <a href="{{ url_for('auth.login') }}" class="btn secondary auth-btn"><i class="fas fa-sign-in-alt"></i>
                    Connexion</a>
                {% endif %}
            </div>
        </header>


        <div class="course-container course-standalone-container">
            <aside class="course-sidebar">
                <div class="course-sidebar-header">
                    <h4><i class="fas fa-list-ul"></i> Sommaire</h4>
                </div>
                <nav id="course-outline" class="course-outline"></nav>
            </aside>
            <main class="course-main">
                <div id="course-content" class="course-content"></div>
                <footer class="course-nav-footer">
                    <button id="course-prev-btn" class="btn secondary"><i class="fas fa-arrow-left"></i>
                        Précédent</button>
                    <div id="course-pagination" class="course-pagination">1 / 10</div>
                    <button id="course-next-btn" class="btn secondary">Suivant <i
                            class="fas fa-arrow-right"></i></button>
                </footer>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='quiz-controller.js') }}?v=5"></script>
    <script src="{{ url_for('static', filename='course-controller.js') }}?v=26"></script>
    <script src="{{ url_for('static', filename='theme.js') }}?v=2"></script>

    {% if current_user.is_authenticated %}
    <script>
        // Check once on load, then every 60 seconds (centralized in theme.js)
        if (typeof window.checkNewBadges === 'function') {
            setTimeout(window.checkNewBadges, 2000);
            setInterval(window.checkNewBadges, 60000);
        }
    </script>
    {% endif %}
</body>

</html>
