<!DOCTYPE html>
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoCompiler - Cours</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=5">
    <link rel="stylesheet" href="{{ url_for('static', filename='course-styles.css') }}?v=14">
    <link rel="stylesheet" href="{{ url_for('static', filename='quiz-styles.css') }}?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="course-standalone-body">
    <div class="course-page-shell">
        {% set header_custom_controls = "" %}
        {% include 'partials/navbar.html' %}


        <div class="course-container course-standalone-container">
            <aside class="course-sidebar">
                <div class="course-sidebar-header">
                    <h4><i class="fas fa-list-ul"></i> Sommaire</h4>
                </div>
                <nav id="course-outline" class="course-outline"></nav>
            </aside>
            <main class="course-main">
                <div id="course-content" class="course-content"></div>
                <footer class="course-nav-footer">
                    <button id="course-prev-btn" class="btn secondary"><i class="fas fa-arrow-left"></i>
                        Précédent</button>
                    <div id="course-pagination" class="course-pagination">1 / 10</div>
                    <button id="course-next-btn" class="btn secondary">Suivant <i
                            class="fas fa-arrow-right"></i></button>
                </footer>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='quiz-controller.js') }}?v=5"></script>
    <script src="{{ url_for('static', filename='course-controller.js') }}?v=26"></script>
    <script src="{{ url_for('static', filename='theme.js') }}?v=2"></script>
    <script src="{{ url_for('static', filename='js/level_pill.js') }}"></script>

    {% if current_user.is_authenticated %}
    <script>
        // Check once on load, then every 60 seconds (centralized in theme.js)
        if (typeof window.checkNewBadges === 'function') {
            setTimeout(window.checkNewBadges, 2000);
            setInterval(window.checkNewBadges, 60000);
        }
    </script>
    {% endif %}
</body>

</html>
