<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - AlgoCompiler</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='course-styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="course-standalone-body">
    <div class="course-page-topbar" style="flex-shrink: 0; z-index: 20;">
        <div style="display:flex; gap:15px; align-items:center;">
            <a href="/" class="course-page-brand" style="text-decoration: none; color: inherit;"><i
                    class="fas fa-terminal"></i> AlgoCompiler</a>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="course-theme-btn" data-theme-toggle title="Basculer le thème">
                <i class="fas fa-sun"></i> <span class="theme-label">Mode Clair</span>
            </button>
        </div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-container login-size">
            <h2 class="auth-title">Nouveau mot de passe</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.new_password') }}">
                <div class="form-group">
                    <label class="form-label">Nouveau mot de passe</label>
                    <input type="password" name="password" minlength="6" class="form-control" required autofocus>
                </div>
                <button type="submit" class="btn-auth btn-primary-auth">Sauvegarder</button>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>

</html>
