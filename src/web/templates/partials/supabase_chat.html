<!-- supabase_chat.html -->
<style>
    /* Global Chat UI */
    #global-chat-widget {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10000;
        font-family: 'Inter', sans-serif;
    }

    #chat-toggle-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4a6ee0, #7c3aed);
        color: white;
        border: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    #chat-toggle-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    #chat-notification-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background: #ef4444;
        color: white;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        font-size: 12px;
        font-weight: bold;
        display: none;
        /* Hidden by default */
        align-items: center;
        justify-content: center;
        border: 2px solid var(--panel-bg);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    #chat-panel {
        display: none;
        flex-direction: column;
        position: absolute;
        bottom: 75px;
        right: 0;
        width: 350px;
        height: 500px;
        max-height: 80vh;
        background: var(--panel-bg);
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-color);
        overflow: hidden;
    }

    #chat-panel.active {
        display: flex;
    }

    .chat-header {
        background: linear-gradient(135deg, #4a6ee0, #2c3e50);
        color: white;
        padding: 15px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chat-header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .chat-mute-btn, .chat-sound-btn, .chat-close-btn {
        background: none;
        border: none;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 0.2s, color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
    }

    .chat-mute-btn.active, .chat-sound-btn.active {
        color: #ffb86c;
    }

    .chat-mute-btn:hover, .chat-sound-btn:hover, .chat-close-btn:hover {
        opacity: 1;
    }

    .chat-messages {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        background: var(--bg-color);
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .chat-message {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 0.9rem;
        line-height: 1.4;
        position: relative;
        word-break: break-word;
    }

    .chat-message.system {
        align-self: center;
        background: rgba(0, 0, 0, 0.1);
        color: var(--text-secondary);
        font-size: 0.8rem;
        padding: 4px 10px;
        border-radius: 10px;
    }

    .chat-message.mine {
        align-self: flex-end;
        background: #4a6ee0;
        color: white;
        border-bottom-right-radius: 4px;
    }

    .chat-message.theirs {
        align-self: flex-start;
        background: var(--panel-bg);
        color: var(--text-color);
        border: 1px solid var(--border-color);
        border-bottom-left-radius: 4px;
    }

    .chat-username {
        font-size: 0.75rem;
        opacity: 0.7;
        margin-bottom: 4px;
        display: block;
    }

    .chat-input-area {
        padding: 15px;
        background: var(--panel-bg);
        border-top: 1px solid var(--border-color);
        display: flex;
        gap: 10px;
    }

    #chat-input-field {
        flex: 1;
        padding: 10px 15px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background: var(--bg-color);
        color: var(--text-color);
        outline: none;
    }

    #chat-send-btn {
        background: #4a6ee0;
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #chat-send-btn:disabled {
        background: var(--border-color);
        cursor: not-allowed;
    }
</style>

<div id="global-chat-widget">
    <button id="chat-toggle-btn" title="Chat Communautaire">
        <i class="fas fa-comments"></i>
        <div id="chat-notification-badge">0</div>
    </button>
    <div id="chat-panel">
        <div class="chat-header">
            <span><i class="fas fa-users"></i> Chat Communautaire</span>
            <div class="chat-header-actions">
                <button class="chat-mute-btn" id="chat-mute-btn" title="Désactiver les notifications">
                    <i class="fas fa-bell"></i>
                </button>
                <button class="chat-sound-btn" id="chat-sound-btn" title="Couper le son">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button class="chat-close-btn" id="chat-close-btn" title="Fermer"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages-container">
            <div class="chat-message system">Bienvenue dans le chat global d'AlgoCompiler !</div>
        </div>

        {% if current_user.is_authenticated %}
        <div class="chat-input-area">
            <input type="text" id="chat-input-field" placeholder="Écrivez un message..." autocomplete="off">
            <button id="chat-send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
        {% else %}
        <div class="chat-input-area" style="justify-content: center; padding: 15px;">
            <a href="/login" style="color: #4a6ee0; text-decoration: none; font-size: 0.9rem;">
                Connectez-vous pour discuter
            </a>
        </div>
        {% endif %}
    </div>
</div>

<!-- Load Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {

        const toggleBtn = document.getElementById('chat-toggle-btn');
        const closeBtn = document.getElementById('chat-close-btn');
        const panel = document.getElementById('chat-panel');
        const messagesContainer = document.getElementById('chat-messages-container');
        const inputField = document.getElementById('chat-input-field');
        const sendBtn = document.getElementById('chat-send-btn');

        let isChatOpen = false;
        let unreadCount = 0;

        const badge = document.getElementById('chat-notification-badge');
        const muteBtn = document.getElementById('chat-mute-btn'); // This is now for Notifications
        const soundBtn = document.getElementById('chat-sound-btn');

        // Notification Sound
        const PING_URL = 'https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3';
        const notificationSound = new Audio(PING_URL);

        let isNotificationsMuted = localStorage.getItem('chat_notifications_muted') === 'true';
        let isSoundMuted = localStorage.getItem('chat_sound_muted') === 'true';

        function updateMuteUI() {
            if (muteBtn) {
                muteBtn.innerHTML = isNotificationsMuted ? '<i class="fas fa-bell-slash"></i>' : '<i class="fas fa-bell"></i>';
                muteBtn.title = isNotificationsMuted ? "Réactiver les notifications" : "Désactiver les notifications";
                muteBtn.classList.toggle('active', isNotificationsMuted);
            }
            if (soundBtn) {
                soundBtn.innerHTML = isSoundMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
                soundBtn.title = isSoundMuted ? "Réactiver le son" : "Couper le son";
                soundBtn.classList.toggle('active', isSoundMuted);
            }
        }

        updateMuteUI();

        if (muteBtn) {
            muteBtn.addEventListener('click', () => {
                isNotificationsMuted = !isNotificationsMuted;
                localStorage.setItem('chat_notifications_muted', isNotificationsMuted);
                updateMuteUI();
            });
        }

        if (soundBtn) {
            soundBtn.addEventListener('click', () => {
                isSoundMuted = !isSoundMuted;
                localStorage.setItem('chat_sound_muted', isSoundMuted);
                updateMuteUI();
            });
        }

        function playNotificationSound() {
            // Only play sound if NOT muted AND notifications are NOT fully muted
            if (!isSoundMuted && !isNotificationsMuted) {
                notificationSound.play().catch(e => console.log("Sound play blocked by browser:", e));
            }
        }

        toggleBtn.addEventListener('click', () => {
            isChatOpen = !isChatOpen;
            panel.classList.toggle('active', isChatOpen);
            if (isChatOpen) {
                if (inputField) inputField.focus();
                // Clear badge when opening
                unreadCount = 0;
                badge.style.display = 'none';
                badge.innerText = '0';
            }
        });

        closeBtn.addEventListener('click', () => {
            isChatOpen = false;
            panel.classList.remove('active');
        });

        const SUPABASE_URL = "{{ INJECTED_SUPABASE_URL or 'VOTRE_SUPABASE_URL_ICI' }}";
        const SUPABASE_ANON_KEY = "{{ INJECTED_SUPABASE_ANON_KEY or 'VOTRE_SUPABASE_ANON_KEY_ICI' }}";

        // Validation basique
        if (SUPABASE_URL === "VOTRE_SUPABASE_URL_ICI" || !SUPABASE_URL) {
            appendSystemMessage("Configuration Supabase manquante sur le serveur.");
            return;
        }

        if (!SUPABASE_URL.startsWith('http')) {
            appendSystemMessage("Erreur : L'URL Supabase est mal configurée (doit commencer par https://).");
            console.error("Invalid SUPABASE_URL:", SUPABASE_URL);
            return;
        }

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // User Info (Injecté par Flask/Jinja)
        const currentUser = "{{ current_user.name if current_user.is_authenticated else 'Anonyme' }}";
        const isAuthenticated = ("{{ 'true' if current_user.is_authenticated else 'false' }}" === "true");

        function appendMessage(user, text, isMine, isHistory = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${isMine ? 'mine' : 'theirs'}`;
            if (isHistory) msgDiv.style.opacity = '0.8';

            if (!isMine) {
                const userSpan = document.createElement('span');
                userSpan.className = 'chat-username';
                userSpan.innerText = user + (isHistory ? ' (Histo)' : '');
                msgDiv.appendChild(userSpan);
            }

            const textSpan = document.createElement('span');
            textSpan.innerText = text;
            msgDiv.appendChild(textSpan);

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function appendSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message system';
            msgDiv.innerText = text;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Load History (last 48h)
        async function loadHistory() {
            try {
                const fortyEightHoursAgo = new Date(Date.now() - 48 * 60 * 60 * 1000).toISOString();
                const { data, error } = await supabaseClient
                    .from('chat_messages')
                    .select('*')
                    .gte('created_at', fortyEightHoursAgo)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (data && data.length > 0) {
                    messagesContainer.innerHTML = ''; // Clear welcome message
                    const systemMsg = document.createElement('div');
                    systemMsg.className = 'chat-message system';
                    systemMsg.innerText = "Historique des 48 dernières heures";
                    messagesContainer.appendChild(systemMsg);

                    data.forEach(msg => {
                        appendMessage(msg.user_name, msg.text, msg.user_name === currentUser, true);
                    });
                }
            } catch (err) {
                console.error("Erreur chargement historique:", err);
                const errorMsg = err.message || JSON.stringify(err);
                appendSystemMessage("Impossible de charger l'historique : " + errorMsg);
            }
        }

        // Connect to Supabase Realtime Channel
        const room = supabaseClient.channel('global-chat-db');

        room.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, payload => {
            const { user_name, text } = payload.new;
            if (user_name !== currentUser) {
                appendMessage(user_name, text, false);

                // Show notification if chat is closed
                if (!isChatOpen) {
                    unreadCount++;
                    badge.innerText = unreadCount > 9 ? '9+' : unreadCount;
                    badge.style.display = 'flex';

                    // Play sound
                    playNotificationSound();

                    // Show Toast Notification (if NOT muted)
                    if (window.AppToast && !isNotificationsMuted) {
                        window.AppToast.show(
                            user_name, 
                            text, 
                            false, 
                            () => { toggleBtn.click(); }
                        );
                    }

                    // Subtle animation
                    toggleBtn.style.transform = 'scale(1.1)';
                    setTimeout(() => { if (!isChatOpen) toggleBtn.style.transform = ''; }, 200);
                }
            }
        }).subscribe(async (status, err) => {
            if (status === 'SUBSCRIBED') {
                await loadHistory();
                appendSystemMessage("Connecté au chat temps réel. ✅");
            } else if (status === 'CHANNEL_ERROR') {
                appendSystemMessage("Erreur de connexion Realtime.");
                if (err) console.error("Supabase Channel Error:", err);
            } else if (status === 'CLOSED') {
                appendSystemMessage("Connexion fermée.");
            }
        });

        if (isAuthenticated && inputField && sendBtn) {
            const sendMessage = async () => {
                const text = inputField.value.trim();
                if (!text) return;

                // Afficher le message localement tout de suite
                appendMessage(currentUser, text, true);
                inputField.value = '';

                // Envoyer le message via Database Insert
                const { error } = await supabaseClient
                    .from('chat_messages')
                    .insert([{ user_name: currentUser, text: text }]);
                
                if (error) {
                    console.error("Erreur envoi message:", error);
                    const errorMsg = error.message || JSON.stringify(error);
                    appendSystemMessage("Erreur lors de l'envoi du message : " + errorMsg);
                }
            };

            sendBtn.addEventListener('click', sendMessage);
            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }
    });
</script>
